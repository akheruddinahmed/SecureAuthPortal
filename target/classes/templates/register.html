<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — SecureApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0a12;
            --surface:   rgba(255,255,255,0.05);
            --border:    rgba(255,255,255,0.10);
            --accent:    #ff6584;
            --accent2:   #6c63ff;
            --text:      #e8e8f0;
            --muted:     #7a7a9a;
            --success:   #43e97b;
            --error:     #ff6584;
            --radius:    18px;
        }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.30;
            animation: drift 14s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 { width: 550px; height: 550px; background: #ff6584; bottom: -200px; right: -150px; }
        .blob-2 { width: 500px; height: 500px; background: #6c63ff; top: -150px; left: -100px; animation-delay: -7s; }
        .blob-3 { width: 300px; height: 300px; background: #f7971e; top: 30%; right: 20%; animation-delay: -4s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(25px, 18px) scale(1.06); }
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            position: relative;
            z-index: 1;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 48px 44px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 36px;
        }
        .brand-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 22px; font-weight: 800;
            letter-spacing: -0.5px;
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 30px; font-weight: 700;
            margin-bottom: 6px; letter-spacing: -0.5px;
        }
        .card-sub {
            color: var(--muted); font-size: 14px;
            margin-bottom: 32px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px; font-size: 13.5px;
            margin-bottom: 22px;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-error   { background: rgba(255,101,132,0.12); border: 1px solid rgba(255,101,132,0.3); color: var(--error); }
        .alert-success { background: rgba(67,233,123,0.10); border: 1px solid rgba(67,233,123,0.25); color: var(--success); }

        .form-group { margin-bottom: 20px; }

        label {
            display: block; font-size: 13px;
            font-weight: 500; color: var(--muted);
            margin-bottom: 8px; letter-spacing: 0.3px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: var(--accent);
            background: rgba(255,101,132,0.06);
            box-shadow: 0 0 0 4px rgba(255,101,132,0.10);
        }
        input::placeholder { color: rgba(255,255,255,0.25); }

        .btn-primary {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--accent) 0%, #f7971e 100%);
            border: none; border-radius: 12px;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 15px; font-weight: 700;
            letter-spacing: 0.3px; cursor: pointer;
            margin-top: 8px;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 8px 24px rgba(255,101,132,0.35);
        }
        .btn-primary:hover  { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,101,132,0.45); }
        .btn-primary:active { transform: translateY(0); opacity: 0.9; }

        .footer-link {
            text-align: center; margin-top: 28px;
            font-size: 14px; color: var(--muted);
        }
        .footer-link a {
            color: var(--accent); text-decoration: none;
            font-weight: 500; transition: color 0.2s;
        }
        .footer-link a:hover { color: #ff8fa3; }

        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 24px 0; color: var(--muted); font-size: 12px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px;
            background: var(--border);
        }

        /* Password strength bar */
        .strength-wrap { margin-top: 8px; }
        .strength-bar {
            height: 4px; border-radius: 99px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
        }
        .strength-fill {
            height: 100%; width: 0%;
            border-radius: 99px;
            transition: width 0.3s, background 0.3s;
        }
        .strength-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="page">
    <div class="card">

        <div class="brand">
            
            <span class="brand-name">SecureApp</span>
        </div>

        <h1 class="card-title">Create account</h1>
        <p class="card-sub">Join us — it only takes a minute</p>

        <!-- Error alert -->
        <div class="alert alert-error" th:if="${errorMsg != null}" th:text="${errorMsg}"></div>

        <!-- Register Form -->
        <form action="/register" method="post" th:object="${user}">
            <div class="form-group">
                <label for="name">Full name</label>
                <input type="text" id="name" th:field="*{name}" placeholder="John Doe" required/>
            </div>
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" th:field="*{email}" placeholder="you@example.com" required/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}"
                       placeholder="Min. 6 characters" required
                       oninput="checkStrength(this.value)"/>
                <div class="strength-wrap">
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>
            </div>
            <button type="submit" class="btn-primary">Create account →</button>
        </form>

        <div class="divider">or</div>

        <div class="footer-link">
            Already have an account? <a href="/loginPage">Sign in</a>
        </div>
    </div>
</div>

<script>
    function checkStrength(val) {
        const fill  = document.getElementById('strengthFill');
        const label = document.getElementById('strengthLabel');
        let score = 0;
        if (val.length >= 6)  score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const map = [
            { w: '20%',  c: '#ff4444', t: 'Very weak' },
            { w: '40%',  c: '#ff9900', t: 'Weak' },
            { w: '60%',  c: '#ffcc00', t: 'Fair' },
            { w: '80%',  c: '#88cc44', t: 'Strong' },
            { w: '100%', c: '#43e97b', t: 'Very strong 🎉' },
        ];

        if (val.length === 0) { fill.style.width = '0'; label.textContent = ''; return; }
        const s = map[Math.min(score - 1, 4)];
        fill.style.width = s.w;
        fill.style.background = s.c;
        label.textContent = s.t;
        label.style.color = s.c;
    }
</script>
</body>
</html>
