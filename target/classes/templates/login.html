<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — SecureApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0a12;
            --surface:   rgba(255,255,255,0.05);
            --border:    rgba(255,255,255,0.10);
            --accent:    #6c63ff;
            --accent2:   #ff6584;
            --text:      #e8e8f0;
            --muted:     #7a7a9a;
            --success:   #43e97b;
            --error:     #ff6584;
            --radius:    18px;
        }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
            animation: drift 12s ease-in-out infinite alternate;
            pointer-events: none;
        }
        .blob-1 { width: 600px; height: 600px; background: #6c63ff; top: -200px; left: -200px; }
        .blob-2 { width: 500px; height: 500px; background: #ff6584; bottom: -150px; right: -150px; animation-delay: -6s; }
        .blob-3 { width: 350px; height: 350px; background: #43e97b; top: 40%; left: 50%; animation-delay: -3s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.05); }
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

       
        .card {
            width: 100%;
            max-width: 440px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 48px 44px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

      
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 36px;
        }
        .brand-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .card-sub {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

    
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13.5px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-error  { background: rgba(255,101,132,0.12); border: 1px solid rgba(255,101,132,0.3); color: var(--error); }
        .alert-success{ background: rgba(67,233,123,0.10); border: 1px solid rgba(67,233,123,0.25); color: var(--success); }

        
        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: var(--accent);
            background: rgba(108,99,255,0.08);
            box-shadow: 0 0 0 4px rgba(108,99,255,0.12);
        }
        input::placeholder { color: rgba(255,255,255,0.25); }

        
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.3px;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 8px 24px rgba(108,99,255,0.35);
        }
        .btn-primary:hover  { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(108,99,255,0.45); }
        .btn-primary:active { transform: translateY(0);    opacity: 0.9; }

        
        .footer-link {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: var(--muted);
        }
        .footer-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .footer-link a:hover { color: #a89dff; }

   
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 24px 0;
            color: var(--muted); font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="page">
    <div class="card">

        
        <div class="brand">
            <div class="brand-icon">🔐</div>
            <span class="brand-name">SecureApp</span>
        </div>

        <h1 class="card-title">Welcome back</h1>
        <p class="card-sub">Sign in to your account to continue</p>

        
        <div class="alert alert-error" th:if="${errorMsg != null}" th:text="${errorMsg}"></div>

     
        <div class="alert alert-success" th:if="${successMsg != null}" th:text="${successMsg}"></div>

       
        <form action="/login" method="post">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required/>
            </div>
            <button type="submit" class="btn-primary">Sign in →</button>
        </form>

        <div class="divider">or</div>

        <div class="footer-link">
            Don't have an account? <a href="/registerPage">Create one</a>
        </div>
    </div>
</div>

</body>
</html>
