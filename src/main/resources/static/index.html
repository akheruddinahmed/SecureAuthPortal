<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureApp</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #6c63ff, #ff6584);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 30px;
            font-size: 18px;
        }

        .btn {
            padding: 12px 26px;
            margin: 8px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }

        .login-btn {
            background: white;
            color: #333;
        }

        .register-btn {
            background: #000;
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔐 SecureApp</h1>
    <p>Simple Login & Registration System</p>

    <a href="/loginPage" class="btn login-btn">Login</a>
    <a href="/registerPage" class="btn register-btn">Register</a>
</div>

</body>
</html>
