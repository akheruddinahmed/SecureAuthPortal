<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Profile — SecureApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0a0a12;
            --border:   rgba(255,255,255,0.10);
            --accent:   #43e97b;
            --accent2:  #38f9d7;
            --text:     #e8e8f0;
            --muted:    #7a7a9a;
            --card-bg:  rgba(255,255,255,0.04);
        }

        html, body {
            min-height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .blob {
            position: fixed; border-radius: 50%;
            filter: blur(90px); opacity: 0.28;
            animation: drift 14s ease-in-out infinite alternate;
            pointer-events: none; z-index: 0;
        }
        .blob-1 { width: 600px; height: 600px; background: #43e97b; top: -200px; right: -100px; }
        .blob-2 { width: 500px; height: 500px; background: #6c63ff; bottom: -150px; left: -150px; animation-delay: -7s; }
        .blob-3 { width: 300px; height: 300px; background: #38f9d7; top: 50%; left: 40%; animation-delay: -3s; }

        @keyframes drift {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(25px,20px) scale(1.05); }
        }

        
        nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; height: 64px;
            background: rgba(10,10,18,0.75);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-brand {
            font-family: 'Syne', sans-serif;
            font-size: 20px; font-weight: 800;
            display: flex; align-items: center; gap: 10px;
        }
        .nav-brand span { font-size: 18px; }
        .btn-logout {
            padding: 9px 22px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text); font-family: 'DM Sans', sans-serif;
            font-size: 14px; font-weight: 500;
            cursor: pointer; text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.2); }

       
        .main {
            position: relative; z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }

        
        .greeting-tag {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(67,233,123,0.10);
            border: 1px solid rgba(67,233,123,0.25);
            border-radius: 99px;
            padding: 6px 16px;
            font-size: 13px; color: var(--accent);
            font-weight: 500; margin-bottom: 20px;
            animation: fadeIn 0.5s ease both;
        }
        .greeting-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(36px, 6vw, 58px);
            font-weight: 800; letter-spacing: -1.5px;
            line-height: 1.05;
            margin-bottom: 12px;
            animation: fadeIn 0.6s 0.1s ease both;
        }
        .greeting-title .name-highlight {
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .greeting-sub {
            color: var(--muted); font-size: 17px; line-height: 1.6;
            max-width: 500px;
            margin-bottom: 48px;
            animation: fadeIn 0.6s 0.2s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
            animation: fadeIn 0.6s 0.3s ease both;
			
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px 22px;
            backdrop-filter: blur(16px);
            transition: transform 0.2s, box-shadow 0.2s;
			text-align: center;
			
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
        .stat-icon { font-size: 26px; margin-bottom: 12px; }
           
			
		.stat-value {
		    font-size: 22px;
		    font-weight: 800;
		    color: var(--accent);
		    text-align: center;
		    word-break: break-word;  
		}
		
        .stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; }

        
        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s 0.4s ease both;
        }
        .profile-card-header {
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }
        .avatar {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 28px; font-weight: 800;
            color: #0a0a12;
            flex-shrink: 0;
            box-shadow: 0 8px 24px rgba(67,233,123,0.35);
        }
        .profile-name {
            font-family: 'Syne', sans-serif;
            font-size: 22px; font-weight: 700;
        }
        .profile-role {
            font-size: 13px; color: var(--muted); margin-top: 3px;
        }
        .badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(67,233,123,0.12);
            border: 1px solid rgba(67,233,123,0.25);
            border-radius: 99px;
            padding: 3px 11px;
            font-size: 12px; color: var(--accent);
            font-weight: 500; margin-top: 8px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 560px) { .info-grid { grid-template-columns: 1fr; } }

        .info-item label {
            display: block; font-size: 12px;
            color: var(--muted); font-weight: 500;
            letter-spacing: 0.5px; text-transform: uppercase;
            margin-bottom: 6px;
        }
        .info-item .info-value {
            font-size: 15px; font-weight: 500;
            padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .cta-row {
            display: flex; gap: 12px;
            margin-top: 32px; flex-wrap: wrap;
        }
        .btn-green {
            padding: 13px 28px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none; border-radius: 12px;
            color: #0a0a12;
            font-family: 'Syne', sans-serif;
            font-size: 14px; font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(67,233,123,0.30);
        }
        .btn-green:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(67,233,123,0.40); }
        .btn-outline {
            padding: 13px 28px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px; font-weight: 500;
            cursor: pointer; text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-outline:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- Navbar -->
<nav>
    <div class="nav-brand"><span>🔐</span> SecureApp</div>
    <a href="/logout" class="btn-logout">Sign out</a>
</nav>

<!-- Main -->
<div class="main">

    <!-- Greeting -->
    <div class="greeting-tag">✅ Logged in successfully</div>
    <h1 class="greeting-title">
        Hello, <span class="name-highlight" th:text="${modelName}">User</span>!
    </h1>
    <p class="greeting-sub">Welcome back to your dashboard. Here's a quick look at your account.</p>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">🎯</div>
            <div class="stat-value">Active</div>
            <div class="stat-label">Account Status</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🛡️</div>
            <div class="stat-value">Secured</div>
            <div class="stat-label">Security Level</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🗓️</div>
            <div class="stat-value">Today</div>
            <div class="stat-label">Last Login</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⚡</div>
            <div class="stat-value">Standard</div>
            <div class="stat-label">Plan</div>
        </div>
    </div>

    <!-- Profile card -->
    <div class="profile-card">

        <div class="profile-card-header">
            <!-- Avatar with first letter of name -->
            <div class="avatar" th:text="${#strings.toUpperCase(#strings.substring(modelName, 0, 1))}">U</div>
            <div>
                <div class="profile-name" th:text="${modelName}">User Name</div>
                <div class="profile-role">Member</div>
                <div class="badge">✓ Verified</div>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <label>Full Name</label>
                <div class="info-value" th:text="${modelName}">—</div>
            </div>
            <div class="info-item">
                <label>Account Type</label>
                <div class="info-value">Standard User</div>
            </div>
            <div class="info-item">
                <label>Member Since</label>
                <div class="info-value">2025</div>
            </div>
            <div class="info-item">
                <label>Session Status</label>
                <div class="info-value">Active ✅</div>
            </div>
        </div>

        <div class="cta-row">
            <a href="#" class="btn-green">Edit Profile</a>
            <a href="/logout" class="btn-outline">Sign Out</a>
        </div>

    </div>
</div>

</body>
</html>
